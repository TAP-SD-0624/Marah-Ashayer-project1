<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="favorites.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito+Sans">
    <title>Details</title>
</head>
<body>
    <div class="layout">
        <header>

            <h4><a href='index.html'>Web Topics</a></h4>
            <div class="buttons">
                <button data-theme-toggle  
                        aria-label="Change to light theme" class="button-class">
                    <ion-icon name="moon-outline"></ion-icon>
                    <span>Dark Mood</span>
                </button>
                <button class="button-class" id="show-favorites">
                    <ion-icon name="heart-outline"></ion-icon>
                    <span>Favourites</span>
                </button>
            </div>
        </header>
            
            <section class="welcome_section">
                <div class="triangles">
                    <div class="green-triangle"></div>
                    <div class="blue-triangle"></div>
                </div>
                <div class="center-welcome">
                    <div class="welcoming-p">
                        <p class="welcome">Welcome to our website!</p>
                        <p class="underwelcome">We have a new design that's fresh,modern,and easy to use.</p>
                    </div>
                </div>
            </section>

        <main>
            <section class="section1">
                <div class="details">
                    <h5 class="detail-category"></h5>
                    <h2 class="detail-title"></h2>
                    <div class="detail-rating"></div>
                    <p class="detail-description"></p>
                </div>
        
            
                <div class="details-card">
                    <img src="" alt="" class="detail-img">
                    <div style="margin: 5px 15px;">
                        <p class="detail-author">
                            <strong></strong> by<a href="#" class="details__link"></a>
                        </p>
                        <div class="add-to-fav">
                            <p style="font-size: 13px;font-weight: bold;">Interested about this topic?</p>
                            <button class="add-to-favorites" id="addToFavorites"><span>Add to Favourites</span> <ion-icon name="heart-outline"></ion-icon></button>
                            <p style=" font-size: 10px; color: #9c9c9c;font-weight: 400;text-align: center;">Unlimited Credits</p>
                        </div>
                    </div>
                </div>
    

            </section>
        
        <div class="table">
            <section class="subtopics">
                <div class="detail-sub-topics">
                    <h2 class="detail-sub-title"></h2>
                    <ul>
                        <li class="detail-sub-list"></li>
                    </ul>
                </div>
            </section>
        </div>

        <section id="favorites-container" class="favorites-section hidden">
            <div>
                <h2>My Favorite Topics</h2>
                <div class="favorite-list" id="favorites-list"></div>
            </div>
        </section>
    </main>
    
        <footer>
            <p>Developed with ❤️ © 2023</p>
        </footer>
    </div>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="script.js"></script>
    <script type="module" src="./main.js"></script>
    <script type="module" src="./details.js"></script>
    <script type="module" src="./favorites.js"></script>
</body>
</html>
